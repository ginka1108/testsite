<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/logo-dark.png">
  <link rel="apple-touch-icon" href="assets/logo-dark.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/guests.css">
</head>
<body>

<nav id="navbar" class="scrolled">
  <a class="nav-logo" href="top.html"><img src="assets/logo-dark.png" alt="きみ夏宵あそび"></a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
  <label for="nav-toggle" class="nav-burger" aria-label="メニュー"><span></span><span></span><span></span></label>
  <ul class="nav-links">
    <li><a href="top.html">Home</a></li>
    <li><a href="guests.html">Guests</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="rules.html">Rules</a></li>
    <li><a href="results.html">Results</a></li>
    <li><a href="sponsors.html">Sponsors</a></li>
    <li><a href="room.html">Photo</a></li>
    <li><a href="creators.html">Creators</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-content">
    <span class="en-label">GUESTS</span>
    <h1 class="page-title">ゲスト紹介</h1>
    <p class="page-sub">夏の宵を彩るメンバーたち</p>
  </div>
</div>

<main>

<section class="guest-section host-section" id="host-section">
  <div class="section-title reveal">
    <span class="en">Host</span>
    <h2 class="ja">主催</h2>
    <div class="divider"></div>
  </div>
  <div id="host-feature-wrap"></div>
</section>

<section class="guest-section teams-section alt-bg">
  <div class="section-title reveal">
    <span class="en">Teams</span>
    <h2 class="ja">参加チーム</h2>
    <div class="divider"></div>
    <p class="section-desc reveal">各チームにリーダーペアとお祭り男・お祭り女が所属しています。<br>同卓した相手より着順が上であれば縁日ボーナスを獲得！</p>
  </div>
  <div id="teams-wrap"></div>
</section>

<section class="guest-section">
  <div class="section-title reveal">
    <span class="en">Participating Guests</span>
    <h2 class="ja">参加ゲスト</h2>
    <div class="divider"></div>
  </div>
  <div class="guest-grid four-col" id="guests-grid"></div>
</section>

</main>

<footer>
  <img src="assets/logo-dark.png" alt="きみ夏宵あそび" style="height:48px; margin-bottom:20px; opacity:0.7;">
  <p>めあともえ presents「きみ夏宵あそび」Night Fes</p>
  <p>© 2024 めあともえ企画</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="js/data-loader.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 10), { passive: true });

function revealAll() {
  document.querySelectorAll('.reveal').forEach(el => {
    const delay = parseFloat(el.style.getPropertyValue('--delay') || '0');
    gsap.to(el, { opacity: 1, y: 0, duration: 0.85, delay, ease: 'power2.out',
      scrollTrigger: { trigger: el, start: 'top 88%', toggleActions: 'play none none none' } });
  });
}

function linkBtns(links) {
  const btns = [];
  if (links.youtube) btns.push(`<a href="${links.youtube}" class="channel-link yt">▶</a>`);
  if (links.twitter) btns.push(`<a href="${links.twitter}" class="channel-link tw">𝕏</a>`);
  return btns.join('');
}

function avatarHtml(m, cls) {
  if (m.avatar) {
    return `<img src="${m.avatar}" alt="${m.name}" class="${cls}"
      onerror="this.outerHTML='<div class=\\'${cls} placeholder-avatar\\' style=\\'--hue:${m.avatar_hue}\\'>${m.avatar_initial}</div>'">`; 
  }
  return `<div class="${cls} placeholder-avatar" style="--hue:${m.avatar_hue}">${m.avatar_initial}</div>`;
}

function memberCard(m) {
  return `
    <div class="team-member-card">
      ${avatarHtml(m, 'member-avatar')}
      <div class="member-name">${m.name}</div>
      <div class="member-links">${linkBtns(m.links)}</div>
    </div>`;
}

async function loadHost() {
  const { hosts } = await KNY.load('hosts');
  const h = hosts[0];
  document.getElementById('host-feature-wrap').innerHTML = `
    <div class="host-feature glass-card reveal">
      <div class="host-feature-visual">
        ${h.avatar
          ? `<img src="${h.avatar}" alt="${h.name}" class="host-feature-img"
               onerror="this.style.display='none'">`
          : `<div class="host-feature-img placeholder-avatar" style="--hue:${h.avatar_hue};width:200px;height:200px;font-size:4rem;">${h.avatar_initial}</div>`}
        <div class="host-feature-glow"></div>
      </div>
      <div class="host-feature-info">
        <span class="host-feature-role">${h.role}</span>
        <h3 class="host-feature-name">${h.name}</h3>
        <p class="host-feature-desc">${h.desc.replace(/\n/g,'<br>')}</p>
        <div class="host-feature-links">
          ${h.links.youtube ? `<a href="${h.links.youtube}" class="channel-link yt">▶ YouTube</a>` : ''}
          ${h.links.twitter ? `<a href="${h.links.twitter}" class="channel-link tw">𝕏 Twitter</a>` : ''}
        </div>
      </div>
    </div>`;
}

async function loadTeams() {
  const { teams } = await KNY.load('teams');
  document.getElementById('teams-wrap').innerHTML = teams.map(t => `
    <div class="team-frame reveal" style="--team-color:${t.color};">
      <div class="team-frame-header">
        <span class="team-mark"></span>
        <h3 class="team-name">${t.name}</h3>
      </div>
      <div class="team-subsection">
        <span class="team-role-label leader">リーダーペア</span>
        <div class="team-members leader-pair">${t.leaders.map(memberCard).join('')}</div>
      </div>
      <div class="team-subsection">
        <span class="team-role-label matsuri">お祭り男・女</span>
        <div class="team-members matsuri-group">${t.matsuri.map(memberCard).join('')}</div>
      </div>
    </div>`).join('');
}

async function loadGuests() {
  const { guests } = await KNY.load('guests');
  document.getElementById('guests-grid').innerHTML = guests.map(g => `
    <div class="guest-card glass-card reveal">
      <div class="role-badge player">参加ゲスト</div>
      ${avatarHtml(g, 'guest-avatar')}
      <h3 class="guest-card-name">${g.name}</h3>
      <p class="guest-desc">${g.desc}</p>
      <div class="guest-links">
        ${g.links.youtube ? `<a href="${g.links.youtube}" class="channel-link yt">▶ YouTube</a>` : ''}
        ${g.links.twitter ? `<a href="${g.links.twitter}" class="channel-link tw">𝕏 Twitter</a>` : ''}
      </div>
    </div>`).join('');
}

(async () => {
  try { await Promise.all([loadHost(), loadTeams(), loadGuests()]); }
  catch (e) { console.error('Data load error:', e); }
  revealAll();
})();
</script>
</body>
</html>
