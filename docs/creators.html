<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="js/data-loader.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 10), { passive: true });

function revealAll() {
  document.querySelectorAll('.reveal').forEach(el => {
    const delay = parseFloat(el.style.getPropertyValue('--delay') || '0');
    gsap.to(el, { opacity: 1, y: 0, duration: 0.85, delay, ease: 'power2.out',
      scrollTrigger: { trigger: el, start: 'top 88%', toggleActions: 'play none none none' } });
  });
}

// リンクボタン（クリエイターヘッダー用）
function creatorLinks(links) {
  const map = { twitter: ['tw','X (Twitter)'], youtube: ['yt','YouTube'],
                booth: ['booth','BOOTH'], pixiv: ['pixiv','pixiv'], skeb: ['skeb','SKEB'] };
  return Object.entries(links || {}).filter(([,v])=>v).map(([k]) => {
    if (!map[k]) return '';
    const [cls, label] = map[k];
    return `<a href="${links[k]}" class="channel-link ${cls}">${label}</a>`;
  }).join('');
}

// 作品カード
function workCard(w) {
  const aspect = w.thumb_aspect ? `style="aspect-ratio:${w.thumb_aspect}"` : '';
  const thumbImg = w.thumb
    ? `<img src="${w.thumb}" alt="${w.title}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="work-thumb-placeholder" style="display:none;">${w.thumb_emoji || '🎐'}</div>`
    : `<div class="work-thumb-placeholder">${w.thumb_emoji || '🎐'}</div>`;
  return `
    <a href="${w.url || '#'}" class="work-card" target="_blank" rel="noopener">
      <div class="work-thumb" ${aspect}>
        ${thumbImg}
        <span class="work-link-badge">${w.badge}</span>
      </div>
      <div class="work-body">
        <span class="work-type-tag ${w.type}">${w.type_label}</span>
        <h3 class="work-title">${w.title}</h3>
        <p class="work-desc">${w.desc}</p>
        <span class="work-cta">${w.cta}</span>
      </div>
    </a>`;
}

// 作品グリッドのクラスを件数で決定
function gridClass(n) {
  if (n === 1) return 'one-col';
  if (n === 2) return 'two-col';
  return '';
}

async function loadCreators() {
  const { creators } = await KNY.load('creators');
  const wrap = document.getElementById('creators-wrap');

  wrap.innerHTML = creators.map((c, idx) => {
    const avatarHtml = c.avatar
      ? `<img src="${c.avatar}" alt="${c.name}" class="creator-avatar"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
         <div class="creator-avatar-placeholder" style="--hue:${c.avatar_hue};display:none;">${c.avatar_initial}</div>`
      : `<div class="creator-avatar-placeholder" style="--hue:${c.avatar_hue};">${c.avatar_initial}</div>`;

    const divider = idx < creators.length - 1
      ? '<hr class="creator-divider">' : '';

    return `
      <div class="creator-block reveal">
        <div class="creator-header">
          <div class="creator-avatar-wrap">${avatarHtml}</div>
          <div class="creator-info">
            <span class="creator-role-tag">${c.role}</span>
            <span class="creator-name">${c.name}</span>
            <span class="creator-handle">${c.handle}</span>
          </div>
          <div class="creator-header-links">${creatorLinks(c.links)}</div>
        </div>
        <div class="works-grid ${gridClass(c.works.length)}">
          ${c.works.map(workCard).join('')}
        </div>
      </div>
      ${divider}`;
  }).join('');
}

(async () => {
  try { await loadCreators(); }
  catch (e) { console.error('Data load error:', e); }
  revealAll();
})();
</script>
</body>
